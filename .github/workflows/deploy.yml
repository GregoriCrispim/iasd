name: Deploy Automático para Hostgator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deploy payload
        run: |
          test -f artisan
          test -d public
          echo "Deploy payload ready."

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          protocol: ftps
          port: 21 # Força a comunicação na porta padrão de FTP
          timeout: 120000 # Aumenta o tempo limite de resposta (em milissegundos)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**